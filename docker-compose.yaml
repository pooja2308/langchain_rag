version: "3.9"

services:
  app:
    container_name: app
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres
      - ollama
    environment:
      PROFILE: docker
      DATABASE_URL: postgresql://user:password@postgres:5432/mydb
      OLLAMA_API_URL: http://ollama:11434
    networks:
      - common

  redis:
    container_name: redis
    image: redis:latest
    ports:
      - "6379:6379"
    networks:
      - common

  postgres:
    container_name: postgres
    image: postgres:latest
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    networks:
      - common

  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    networks:
      - common

volumes:
  ollama_data:

networks:
  common:
    driver: bridge